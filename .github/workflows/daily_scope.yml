name: SCOPE — Daily Job Search

on:
  # Runs every day at 09:00 AM Eastern Time (13:00 UTC)
  schedule:
    - cron: "0 13 * * *"

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-scope:
    name: Run SCOPE Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js setup ───────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Install Playwright browser binaries ──────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── Run SCOPE ────────────────────────────────────────────────────────────
      - name: Run SCOPE daily agent
        run: npx ts-node src/cron.ts
        env:
          # Core API keys
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

          # Gmail — must be an App Password (not your account password)
          # Enable at: https://myaccount.google.com/apppasswords
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}

          # Google Sheets — spreadsheet ID from the URL
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

          # Google Service Account — paste the full JSON as a single-line string
          # in GitHub Secrets under GOOGLE_SERVICE_ACCOUNT_JSON
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      # ── Upload SQLite DB as artifact (optional — useful for debugging) ────────
      - name: Upload SQLite checkpoint DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scope-memory-${{ github.run_id }}
          path: scope_memory.db
          retention-days: 7
